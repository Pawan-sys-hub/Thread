<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard — TrendTrack</title>
  <link rel="stylesheet" href="../../css/style.css">
  <style>
    body {
      margin: 0;
      background: var(--gray-100);
    }

    .mini-table td,
    .mini-table th {
      padding: 10px 14px;
      font-size: 0.82rem;
    }
  </style>
</head>

<body data-page="dashboard">
  <script src="../../js/main.js"></script>
  <script src="../../js/admin.js"></script>
  <script>
    (async () => {
      const user = await requireAdmin();
      if (!user) return;
      buildAdminLayout('Dashboard', `Welcome back, ${user.name}`);
      document.getElementById('adminUserAvatar').textContent = user.name?.charAt(0)?.toUpperCase() || 'A';
      loadDashboard();
    })();

    async function loadDashboard() {
      const content = document.getElementById('adminContent');
      content.innerHTML = `<div style="display:flex;align-items:center;gap:10px;padding:48px;justify-content:center;color:var(--gray-400)"><div style="width:24px;height:24px;border:3px solid var(--border);border-top-color:var(--black);border-radius:50%;animation:spin .8s linear infinite"></div> Loading…</div>`;

      const data = await get(API.adminDashboard);
      if (!data.success) { content.innerHTML = '<p style="color:var(--red);padding:24px">Failed to load dashboard.</p>'; return; }

      const s = data.stats;
      content.innerHTML = `
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-icon">👥</div>
        <div class="stat-label">Total Customers</div>
        <div class="stat-value">${s.total_users}</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">📦</div>
        <div class="stat-label">Total Products</div>
        <div class="stat-value">${s.total_products}</div>
        ${s.low_stock > 0 ? `<div class="stat-change" style="color:var(--orange)">⚠️ ${s.low_stock} low stock</div>` : '<div class="stat-change up">All stocked</div>'}
      </div>
      <div class="stat-card">
        <div class="stat-icon">🚚</div>
        <div class="stat-label">Total Orders</div>
        <div class="stat-value">${s.total_orders}</div>
        ${s.pending_orders > 0 ? `<div class="stat-change" style="color:var(--orange)">${s.pending_orders} pending</div>` : ''}
      </div>
      <div class="stat-card">
        <div class="stat-icon">💰</div>
        <div class="stat-label">Total Revenue</div>
        <div class="stat-value" style="font-size:1.4rem">${formatNPR(s.total_revenue)}</div>
        <div class="stat-change up">Across all orders</div>
      </div>
    </div>

    <div style="display:grid;grid-template-columns:2fr 1fr;gap:20px;margin-bottom:20px">
      <div class="admin-card">
        <div class="admin-card-header">
          <h3 class="admin-card-title">🕐 Recent Orders</h3>
          <a href="orders.html" style="font-size:0.8rem;color:var(--gray-500)">View all →</a>
        </div>
        <div class="admin-card-body">
          <table class="admin-table mini-table">
            <thead><tr><th>Order</th><th>Customer</th><th>Amount</th><th>Status</th></tr></thead>
            <tbody>
              ${data.recent_orders.length
          ? data.recent_orders.map(o => `<tr>
                    <td>#${o.id}<br><span style="color:var(--gray-400);font-size:0.72rem">${formatDate(o.created_at)}</span></td>
                    <td>${o.customer_name}<br><span style="color:var(--gray-400);font-size:0.72rem">${o.email}</span></td>
                    <td style="font-weight:700">${formatNPR(o.total_amount)}</td>
                    <td>${statusBadge(o.status)}</td>
                  </tr>`).join('')
          : '<tr><td colspan="4" style="text-align:center;padding:24px;color:var(--gray-400)">No orders yet</td></tr>'}
            </tbody>
          </table>
        </div>
      </div>
      <div class="admin-card">
        <div class="admin-card-header"><h3 class="admin-card-title">📊 Order Status</h3></div>
        <div style="padding:20px;display:flex;flex-direction:column;gap:10px">
          ${['pending', 'processing', 'shipped', 'delivered', 'cancelled'].map(st => {
            const cnt = s.orders_by_status?.[st] || 0;
            const pct = s.total_orders > 0 ? Math.round((cnt / s.total_orders) * 100) : 0;
            return `<div>
              <div style="display:flex;justify-content:space-between;margin-bottom:4px;font-size:0.8rem">
                <span style="font-weight:600;text-transform:capitalize">${st}</span>
                <span style="color:var(--gray-400)">${cnt}</span>
              </div>
              <div style="background:var(--gray-200);border-radius:4px;height:6px">
                <div style="background:var(--black);height:6px;border-radius:4px;width:${pct}%;transition:width .5s"></div>
              </div>
            </div>`;
          }).join('')}
        </div>
      </div>
    </div>

    <div class="admin-card">
      <div class="admin-card-header"><h3 class="admin-card-title">🏆 Top Products</h3></div>
      <div class="admin-card-body">
        <table class="admin-table mini-table">
          <thead><tr><th>Product</th><th>Units Sold</th></tr></thead>
          <tbody>
            ${data.top_products.length
          ? data.top_products.map((p, i) => `<tr>
                  <td style="font-weight:600">${['🥇', '🥈', '🥉', '4️⃣', '5️⃣'][i]} ${p.name}</td>
                  <td><span class="status-badge status-delivered">${p.sold} sold</span></td>
                </tr>`).join('')
          : '<tr><td colspan="2" style="text-align:center;padding:24px;color:var(--gray-400)">No sales yet</td></tr>'}
          </tbody>
        </table>
      </div>
    </div>

    <div style="margin-top:20px;display:grid;grid-template-columns:repeat(4,1fr);gap:12px">
      <a href="products.html" style="display:flex;flex-direction:column;align-items:center;gap:8px;padding:20px;background:var(--white);border:1px solid var(--border);border-radius:var(--radius-lg);transition:all .2s;text-align:center" onmouseover="this.style.boxShadow='var(--shadow-md)'" onmouseout="this.style.boxShadow='none'"><span style="font-size:1.8rem">📦</span><span style="font-weight:600;font-size:0.875rem">Manage Products</span></a>
      <a href="categories.html" style="display:flex;flex-direction:column;align-items:center;gap:8px;padding:20px;background:var(--white);border:1px solid var(--border);border-radius:var(--radius-lg);transition:all .2s;text-align:center" onmouseover="this.style.boxShadow='var(--shadow-md)'" onmouseout="this.style.boxShadow='none'"><span style="font-size:1.8rem">🗂️</span><span style="font-weight:600;font-size:0.875rem">Categories</span></a>
      <a href="orders.html" style="display:flex;flex-direction:column;align-items:center;gap:8px;padding:20px;background:var(--white);border:1px solid var(--border);border-radius:var(--radius-lg);transition:all .2s;text-align:center" onmouseover="this.style.boxShadow='var(--shadow-md)'" onmouseout="this.style.boxShadow='none'"><span style="font-size:1.8rem">🚚</span><span style="font-weight:600;font-size:0.875rem">All Orders</span></a>
      <a href="users.html" style="display:flex;flex-direction:column;align-items:center;gap:8px;padding:20px;background:var(--white);border:1px solid var(--border);border-radius:var(--radius-lg);transition:all .2s;text-align:center" onmouseover="this.style.boxShadow='var(--shadow-md)'" onmouseout="this.style.boxShadow='none'"><span style="font-size:1.8rem">👥</span><span style="font-weight:600;font-size:0.875rem">Users</span></a>
    </div>`;
    }
  </script>
</body>

</html>
