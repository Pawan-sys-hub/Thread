<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard — TrendTrack</title>
  <link rel="stylesheet" href="../../css/style.css">
  <style>
    body {
      margin: 0;
      background: #f1f3f6;
    }

    .mini-table td,
    .mini-table th {
      padding: 10px 16px;
      font-size: 0.82rem;
    }

    /* Colored stat cards */
    .stat-card.blue {
      border-top: 3px solid #3b82f6;
    }

    .stat-card.blue .stat-icon {
      background: #eff6ff;
      border-radius: 10px;
      display: inline-block;
      padding: 10px;
    }

    .stat-card.green {
      border-top: 3px solid #22c55e;
    }

    .stat-card.green .stat-icon {
      background: #f0fdf4;
      border-radius: 10px;
      display: inline-block;
      padding: 10px;
    }

    .stat-card.orange {
      border-top: 3px solid #f97316;
    }

    .stat-card.orange .stat-icon {
      background: #fff7ed;
      border-radius: 10px;
      display: inline-block;
      padding: 10px;
    }

    .stat-card.purple {
      border-top: 3px solid #a855f7;
    }

    .stat-card.purple .stat-icon {
      background: #faf5ff;
      border-radius: 10px;
      display: inline-block;
      padding: 10px;
    }

    .quick-action {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      padding: 24px 16px;
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      transition: all .2s;
      text-align: center;
      cursor: pointer;
      text-decoration: none;
      color: inherit;
    }

    .quick-action:hover {
      box-shadow: var(--shadow-md);
      transform: translateY(-2px);
      border-color: var(--gray-300);
    }

    .quick-action .qa-icon {
      font-size: 1.9rem;
      width: 52px;
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 12px;
      background: var(--gray-100);
    }

    .quick-action span {
      font-weight: 600;
      font-size: 0.85rem;
      color: var(--gray-700);
    }
  </style>
</head>

<body data-page="dashboard">
  <script src="../../js/main.js"></script>
  <script src="../../js/admin.js"></script>
  <script>
    (async () => {
      const user = await requireAdmin();
      if (!user) return;
      buildAdminLayout('Dashboard', `Welcome back, ${user.name} 👋`);
      document.getElementById('adminUserAvatar').textContent = user.name?.charAt(0)?.toUpperCase() || 'A';
      if (document.getElementById('adminUserName')) document.getElementById('adminUserName').textContent = user.name?.split(' ')[0] || 'Admin';
      loadDashboard();
    })();

    async function loadDashboard() {
      const content = document.getElementById('adminContent');
      content.innerHTML = `<div style="display:flex;align-items:center;gap:12px;padding:64px;justify-content:center;color:var(--gray-400)"><div style="width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--black);border-radius:50%;animation:spin .8s linear infinite"></div> Loading dashboard…</div>`;

      const data = await get(API.adminDashboard);
      if (!data.success) { content.innerHTML = '<p style="color:var(--red);padding:24px">Failed to load dashboard.</p>'; return; }

      const s = data.stats;
      content.innerHTML = `
      <!-- Stat Cards -->
      <div class="stats-grid">
        <div class="stat-card blue">
          <div class="stat-icon">👥</div>
          <div class="stat-label">Total Customers</div>
          <div class="stat-value">${s.total_users}</div>
          <div class="stat-change">${s.total_users > 0 ? 'Registered users' : 'No users yet'}</div>
        </div>
        <div class="stat-card green">
          <div class="stat-icon">📦</div>
          <div class="stat-label">Total Products</div>
          <div class="stat-value">${s.total_products}</div>
          ${s.low_stock > 0 ? `<div class="stat-change" style="color:var(--orange)">⚠️ ${s.low_stock} low stock</div>` : '<div class="stat-change up">✅ All stocked</div>'}
        </div>
        <div class="stat-card orange">
          <div class="stat-icon">🚚</div>
          <div class="stat-label">Total Orders</div>
          <div class="stat-value">${s.total_orders}</div>
          ${s.pending_orders > 0 ? `<div class="stat-change" style="color:var(--orange)">${s.pending_orders} pending</div>` : '<div class="stat-change">All processed</div>'}
        </div>
        <div class="stat-card purple">
          <div class="stat-icon">💰</div>
          <div class="stat-label">Total Revenue</div>
          <div class="stat-value" style="font-size:1.4rem">${formatNPR(s.total_revenue)}</div>
          <div class="stat-change up">Across all orders</div>
        </div>
      </div>

      <!-- Orders + Status -->
      <div style="display:grid;grid-template-columns:2fr 1fr;gap:20px;margin-bottom:20px">
        <div class="admin-card">
          <div class="admin-card-header">
            <h3 class="admin-card-title">🕐 Recent Orders</h3>
            <a href="orders.html" style="font-size:0.8rem;color:var(--gray-500);font-weight:600;transition:color .2s" onmouseover="this.style.color='var(--black)'" onmouseout="this.style.color='var(--gray-500)'">View all →</a>
          </div>
          <div class="admin-card-body">
            <table class="admin-table mini-table">
              <thead><tr><th>Order</th><th>Customer</th><th>Amount</th><th>Status</th></tr></thead>
              <tbody>
                ${data.recent_orders.length
          ? data.recent_orders.map(o => `<tr>
                    <td><div style="font-weight:700">#${o.id}</div><div style="color:var(--gray-400);font-size:0.72rem">${formatDate(o.created_at)}</div></td>
                    <td><div style="font-weight:600">${o.customer_name}</div><div style="color:var(--gray-400);font-size:0.72rem">${o.email}</div></td>
                    <td style="font-weight:700">${formatNPR(o.total_amount)}</td>
                    <td>${statusBadge(o.status)}</td>
                  </tr>`).join('')
          : '<tr><td colspan="4" style="text-align:center;padding:32px;color:var(--gray-400)">No orders yet</td></tr>'}
              </tbody>
            </table>
          </div>
        </div>
        <div class="admin-card">
          <div class="admin-card-header"><h3 class="admin-card-title">📊 Order Status</h3></div>
          <div style="padding:20px;display:flex;flex-direction:column;gap:12px">
            ${['pending', 'processing', 'shipped', 'delivered', 'cancelled'].map(st => {
            const cnt = s.orders_by_status?.[st] || 0;
            const pct = s.total_orders > 0 ? Math.round((cnt / s.total_orders) * 100) : 0;
            const colors = { pending: '#f59e0b', processing: '#3b82f6', shipped: '#06b6d4', delivered: '#22c55e', cancelled: '#ef4444' };
            return `<div>
                <div style="display:flex;justify-content:space-between;margin-bottom:6px;font-size:0.8rem">
                  <span style="font-weight:600;text-transform:capitalize;color:var(--gray-700)">${st}</span>
                  <span style="color:var(--gray-400);font-weight:700">${cnt}</span>
                </div>
                <div style="background:var(--gray-200);border-radius:4px;height:7px;overflow:hidden">
                  <div style="background:${colors[st]};height:7px;border-radius:4px;width:${pct}%;transition:width .6s ease"></div>
                </div>
              </div>`;
          }).join('')}
          </div>
        </div>
      </div>

      <!-- Top Products -->
      <div class="admin-card" style="margin-bottom:20px">
        <div class="admin-card-header"><h3 class="admin-card-title">🏆 Top Products</h3></div>
        <div class="admin-card-body">
          <table class="admin-table mini-table">
            <thead><tr><th>Rank</th><th>Product</th><th>Units Sold</th></tr></thead>
            <tbody>
              ${data.top_products.length
          ? data.top_products.map((p, i) => `<tr>
                  <td style="font-size:1.2rem">${['🥇', '🥈', '🥉', '4️⃣', '5️⃣'][i]}</td>
                  <td style="font-weight:600">${p.name}</td>
                  <td><span class="status-badge status-delivered">${p.sold} sold</span></td>
                </tr>`).join('')
          : '<tr><td colspan="3" style="text-align:center;padding:32px;color:var(--gray-400)">No sales yet</td></tr>'}
            </tbody>
          </table>
        </div>
      </div>

      <!-- Quick Actions -->
      <div style="margin-top:4px">
        <p style="font-size:0.75rem;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:var(--gray-400);margin-bottom:14px">Quick Actions</p>
        <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px">
          <a href="products.html" class="quick-action"><div class="qa-icon">📦</div><span>Manage Products</span></a>
          <a href="categories.html" class="quick-action"><div class="qa-icon">🗂️</div><span>Categories</span></a>
          <a href="orders.html" class="quick-action"><div class="qa-icon">🚚</div><span>All Orders</span></a>
          <a href="users.html" class="quick-action"><div class="qa-icon">👥</div><span>Users</span></a>
        </div>
      </div>`;
    }
  </script>
</body>

</html>
