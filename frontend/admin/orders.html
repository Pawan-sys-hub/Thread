<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Orders — Admin | TrendTrack</title>
  <link rel="stylesheet" href="../../css/style.css">
  <style>
    body {
      margin: 0;
      background: var(--gray-100)
    }
  </style>
</head>

<body data-page="orders">
  <script src="../../js/main.js"></script>
  <script src="../../js/admin.js"></script>

  <div class="modal-backdrop" id="orderDetailModal">
    <div class="modal">
      <div class="modal-header">
        <h3 class="modal-title" id="orderDetailTitle">Order Details</h3>
        <button class="modal-close" onclick="closeModal('orderDetailModal')">✕</button>
      </div>
      <div class="modal-body" id="orderDetailBody"></div>
    </div>
  </div>

  <script>
    let currentPage = 0;
    const LIMIT = 15;

    (async () => {
      const user = await requireAdmin();
      if (!user) return;
      buildAdminLayout('Orders', 'Manage and update order statuses');
      document.getElementById('adminUserAvatar').textContent = user.name?.charAt(0)?.toUpperCase() || 'A';

      document.getElementById('adminContent').innerHTML = `
    <div class="admin-card">
      <div class="admin-toolbar">
        <div class="admin-search"><span>🔍</span><input type="text" id="searchInput" placeholder="Search by order ID or customer…"></div>
        <select id="statusFilter" class="form-control" style="width:auto;padding:8px 12px;font-size:0.875rem">
          <option value="">All Statuses</option>
          <option value="pending">Pending</option>
          <option value="processing">Processing</option>
          <option value="shipped">Shipped</option>
          <option value="delivered">Delivered</option>
          <option value="cancelled">Cancelled</option>
        </select>
        <button onclick="loadOrders()" class="btn btn-ghost btn-sm">🔄 Refresh</button>
      </div>
      <div class="admin-card-body">
        <table class="admin-table">
          <thead><tr><th>Order</th><th>Customer</th><th>Amount</th><th>Payment</th><th>Order Status</th><th>Date</th><th>Actions</th></tr></thead>
          <tbody id="ordersBody"><tr>${loadingRow(7)}</tr></tbody>
        </table>
      </div>
      <div class="pagination" id="pagination" style="padding:16px"></div>
    </div>`;

      let timer;
      document.getElementById('searchInput').addEventListener('input', () => { clearTimeout(timer); timer = setTimeout(() => { currentPage = 0; loadOrders(); }, 400); });
      document.getElementById('statusFilter').addEventListener('change', () => { currentPage = 0; loadOrders(); });
      setupModalClose('orderDetailModal');
      loadOrders();
    })();

    async function loadOrders() {
      const search = document.getElementById('searchInput')?.value.trim() || '';
      const status = document.getElementById('statusFilter')?.value || '';
      let url = `${API.adminOrders}?limit=${LIMIT}&offset=${currentPage * LIMIT}`;
      if (search) url += `&search=${encodeURIComponent(search)}`;
      if (status) url += `&status=${status}`;

      document.getElementById('ordersBody').innerHTML = loadingRow(7);
      const data = await get(url);
      if (!data.success) { document.getElementById('ordersBody').innerHTML = emptyState('Failed to load.', '❌'); return; }
      if (!data.orders.length) { document.getElementById('ordersBody').innerHTML = emptyState('No orders found.', '📦'); buildPagination(0); return; }

      document.getElementById('ordersBody').innerHTML = data.orders.map(o => `
    <tr>
      <td><span style="font-weight:700">#${o.id}</span></td>
      <td>
        <div style="font-weight:600;font-size:0.875rem">${o.customer_name}</div>
        <div style="font-size:0.75rem;color:var(--gray-400)">${o.customer_email}</div>
      </td>
      <td style="font-weight:700">${formatNPR(o.total_amount)}</td>
      <td>
        <div style="font-size:0.8rem;font-weight:600">${(o.payment_method || 'COD').toUpperCase()}</div>
        ${statusBadge(o.payment_status || 'unpaid')}
      </td>
      <td>
        <select class="status-select" onchange="updateOrderStatus(${o.id}, this.value)" style="font-size:0.78rem">
          ${['pending', 'processing', 'shipped', 'delivered', 'cancelled'].map(s =>
        `<option value="${s}" ${o.status === s ? 'selected' : ''}>${s.charAt(0).toUpperCase() + s.slice(1)}</option>`
      ).join('')}
        </select>
      </td>
      <td style="font-size:0.8rem;color:var(--gray-500)">${formatDate(o.created_at)}</td>
      <td>
        <div class="admin-actions">
          <button onclick="viewOrderDetail(${o.id})" class="action-btn view">👁️ View</button>
        </div>
      </td>
    </tr>`).join('');
      buildPagination(data.total);
    }

    function buildPagination(total) {
      const pages = Math.ceil(total / LIMIT);
      const pg = document.getElementById('pagination');
      if (pages <= 1) { pg.innerHTML = ''; return; }
      let html = `<button class="page-btn" onclick="goPage(${currentPage - 1})" ${currentPage === 0 ? 'disabled' : ''}>‹</button>`;
      for (let i = 0; i < Math.min(pages, 10); i++) html += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="goPage(${i})">${i + 1}</button>`;
      html += `<button class="page-btn" onclick="goPage(${currentPage + 1})" ${currentPage === pages - 1 ? 'disabled' : ''}>›</button>`;
      pg.innerHTML = html;
    }
    function goPage(p) { currentPage = p; loadOrders(); }

    async function updateOrderStatus(orderId, status) {
      const r = await put(API.adminOrders, { id: orderId, status });
      if (r.success) showToast(`Order #${orderId} → ${status}`);
      else showToast(r.error || 'Update failed.', 'error');
    }

    async function viewOrderDetail(id) {
      document.getElementById('orderDetailTitle').textContent = `Order #${id}`;
      document.getElementById('orderDetailBody').innerHTML = `<div style="text-align:center;padding:32px"><div style="width:24px;height:24px;border:3px solid var(--border);border-top-color:var(--black);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto"></div></div>`;
      openModal('orderDetailModal');
      const data = await get(`${API.adminOrders}?id=${id}`);
      if (!data.success) { document.getElementById('orderDetailBody').innerHTML = '<p style="color:var(--red)">Failed to load order.</p>'; return; }
      const o = data.order;
      document.getElementById('orderDetailBody').innerHTML = `
    <div style="margin-bottom:20px">
      <p style="font-size:0.8rem;color:var(--gray-400);margin-bottom:8px;font-weight:600">Order Status</p>
      ${orderTracker(o.status)}
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px;font-size:0.875rem">
      <div><span style="color:var(--gray-400)">Customer</span><br><strong>${o.customer_name}</strong><br><span style="font-size:0.78rem;color:var(--gray-400)">${o.email}</span></div>
      <div><span style="color:var(--gray-400)">Status</span><br>${statusBadge(o.status)}</div>
      <div><span style="color:var(--gray-400)">Payment</span><br>${(o.payment_method || 'COD').toUpperCase()} — ${statusBadge(o.payment_status || 'unpaid')}</div>
      <div><span style="color:var(--gray-400)">Date</span><br>${formatDate(o.created_at)}</div>
      <div><span style="color:var(--gray-400)">Phone</span><br>${o.phone}</div>
      <div><span style="color:var(--gray-400)">Total</span><br><strong style="font-size:1.1rem">${formatNPR(o.total_amount)}</strong></div>
    </div>
    <p style="font-size:0.875rem;margin-bottom:16px"><span style="color:var(--gray-400)">Address:</span> ${o.shipping_address}</p>
    <h4 style="margin-bottom:12px;font-size:0.875rem">Items</h4>
    <table class="admin-table" style="font-size:0.82rem">
      <thead><tr><th>Product</th><th>Qty</th><th>Unit Price</th><th>Total</th></tr></thead>
      <tbody>
        ${data.items.map(i => `<tr>
          <td style="font-weight:600">${i.name}</td>
          <td>${i.quantity}</td>
          <td>${formatNPR(i.unit_price)}</td>
          <td style="font-weight:700">${formatNPR(i.quantity * i.unit_price)}</td>
        </tr>`).join('')}
      </tbody>
    </table>
    <div style="border-top:2px solid var(--border);padding-top:12px;margin-top:4px;display:flex;justify-content:flex-end">
      <strong>Total: ${formatNPR(o.total_amount)}</strong>
    </div>
    <div style="margin-top:20px;display:flex;gap:10px">
      <select id="updateStatus-${o.id}" class="status-select">
        ${['pending', 'processing', 'shipped', 'delivered', 'cancelled'].map(s => `<option value="${s}" ${o.status === s ? 'selected' : ''}>${s.charAt(0).toUpperCase() + s.slice(1)}</option>`).join('')}
      </select>
      <select id="updatePayStatus-${o.id}" class="status-select">
        ${['unpaid', 'paid', 'failed'].map(s => `<option value="${s}" ${(o.payment_status || 'unpaid') === s ? 'selected' : ''}>${s.charAt(0).toUpperCase() + s.slice(1)}</option>`).join('')}
      </select>
      <button onclick="updateFromModal(${o.id})" class="btn btn-primary btn-sm">Update</button>
    </div>`;
    }

    async function updateFromModal(id) {
      const status = document.getElementById(`updateStatus-${id}`)?.value;
      const pStatus = document.getElementById(`updatePayStatus-${id}`)?.value;
      const r = await put(API.adminOrders, { id, status, payment_status: pStatus });
      if (r.success) { showToast('Order updated!'); closeModal('orderDetailModal'); loadOrders(); }
      else showToast(r.error || 'Failed.', 'error');
    }
  </script>
</body>

</html>
