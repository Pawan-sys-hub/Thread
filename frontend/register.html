<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Account — TrendTrack</title>
  <link rel="stylesheet" href="../css/style.css">
</head>

<body>
  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-logo">
        <img src="../assets/logo.png" alt="TrendTrack" style="height:32px" onerror="this.style.display='none'">
        TrendTrack
      </div>
      <h1 class="auth-title">Create account</h1>
      <p class="auth-subtitle">Join TrendTrack and discover what's next.</p>

      <div id="formError"
        style="display:none;margin-bottom:16px;padding:12px;background:#fee2e2;border-radius:8px;color:#991b1b;font-size:0.875rem">
      </div>

      <form id="registerForm">
        <div class="form-group">
          <label class="form-label" for="name">Full name</label>
          <input type="text" id="name" class="form-control" placeholder="Your full name" required>
        </div>
        <div class="form-group">
          <label class="form-label" for="email">Email address</label>
          <input type="email" id="email" class="form-control" placeholder="you@example.com" required>
        </div>
        <div class="form-group">
          <label class="form-label" for="phone">Phone number</label>
          <input type="tel" id="phone" class="form-control" placeholder="98XXXXXXXX">
        </div>
        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <input type="password" id="password" class="form-control" placeholder="Min. 6 characters" required
            minlength="6">
          <p class="form-hint">At least 6 characters</p>
        </div>
        <div class="form-group">
          <label class="form-label" for="confirmPassword">Confirm password</label>
          <input type="password" id="confirmPassword" class="form-control" placeholder="Repeat password" required>
        </div>
        <button type="submit" id="registerBtn" class="btn btn-primary btn-full" style="margin-top:8px">Create
          Account</button>
      </form>

      <p class="auth-footer">Already have an account? <a href="login.html">Sign in</a></p>
    </div>
  </div>

  <script src="../js/main.js"></script>
  <script>
    (async () => {
      const s = await getSession();
      if (s.logged_in) window.location.href = '/TrendTrackV2/frontend/index.html';
    })();

    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('registerBtn');
      const err = document.getElementById('formError');
      err.style.display = 'none';

      const pass = document.getElementById('password').value;
      const confirm = document.getElementById('confirmPassword').value;
      if (pass !== confirm) { err.textContent = 'Passwords do not match.'; err.style.display = 'block'; return; }

      btn.disabled = true; btn.textContent = 'Creating account…';
      const r = await post(API.register, {
        name: document.getElementById('name').value,
        email: document.getElementById('email').value,
        phone: document.getElementById('phone').value,
        password: pass,
      });

      if (r.success) {
        clearSession();
        window.location.href = '/TrendTrackV2/frontend/index.html';
      } else {
        err.textContent = r.error || 'Registration failed.';
        err.style.display = 'block';
        btn.disabled = false; btn.textContent = 'Create Account';
      }
    });
  </script>
</body>

</html>
