<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Order Success — TrendTrack</title>
  <link rel="stylesheet" href="../css/style.css">
  <style>
    .success-wrap {
      min-height: 80vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 48px 24px;
    }

    .success-card {
      background: var(--white);
      border-radius: var(--radius-xl);
      padding: 56px 48px;
      text-align: center;
      max-width: 480px;
      width: 100%;
      box-shadow: var(--shadow-xl);
      border: 1px solid var(--border);
      animation: fadeUp .5s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px) }
      to { opacity: 1; transform: translateY(0) }
    }

    .success-icon {
      width: 88px;
      height: 88px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.8rem;
      margin: 0 auto 28px;
    }

    .success-icon.ok { background: #dcfce7; }
    .success-icon.fail { background: #fee2e2; }

    .success-card h1 { font-size: 1.8rem; margin-bottom: 10px; }
    .success-card p { color: var(--gray-500); margin-bottom: 6px; font-size: 0.95rem; }

    .order-ref {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--gray-100);
      border-radius: var(--radius-full);
      padding: 8px 20px;
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--black);
      margin: 20px 0 28px;
    }
  </style>
</head>

<body>
  <section class="success-wrap">
    <div class="success-card" id="card"></div>
  </section>

  <script src="../js/main.js"></script>
  <script>
    document.addEventListener('appReady', async () => {
      const params = new URLSearchParams(window.location.search);
      const orderId = params.get('order');
      const verified = params.get('verified');
      const card = document.getElementById('card');

      function showSuccess(orderNum) {
        card.innerHTML = `
          <div class="success-icon ok">✅</div>
          <h1>Order Placed!</h1>
          <p>Your order has been confirmed and is being processed.</p>
          ${orderNum ? `<div class="order-ref">🧾 Order #${orderNum}</div>` : ''}
          <p style="margin-bottom:32px;font-size:0.85rem">Track your order anytime from My Orders.</p>
          <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap">
            <a href="orders.html" class="btn btn-primary">View My Orders</a>
            <a href="index.html" class="btn btn-ghost">Continue Shopping</a>
          </div>`;
      }

      function showFailure(msg) {
        card.innerHTML = `
          <div class="success-icon fail">❌</div>
          <h1>Payment Failed</h1>
          <p>${msg || 'Your payment could not be verified. Please try again.'}</p>
          <div style="display:flex;gap:12px;justify-content:center;margin-top:28px;flex-wrap:wrap">
            <a href="checkout.html${orderId ? '?order=' + orderId : ''}" class="btn btn-primary">Try Again</a>
            <a href="orders.html" class="btn btn-ghost">View Orders</a>
          </div>`;
      }

      if (!orderId) {
        showFailure('Invalid order reference.');
        return;
      }

      // eSewa payments are verified server-side in php/esewa-verify.php
      if (verified === '1') {
        showSuccess(orderId);
        return;
      }

      const user = await requireAuth();
      if (!user) return;

      const check = await get(`${API.order}?id=${orderId}`);
      if (check.success && check.order) {
        if (check.order.payment_status === 'paid' || check.order.payment_method === 'cod') {
          showSuccess(orderId);
        } else {
          showFailure('Payment not completed. Please try again or check My Orders.');
        }
      } else {
        showFailure('Could not load order details.');
      }
    });
  </script>
</body>

</html>
