<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout — TrendTrack</title>
  <link rel="stylesheet" href="../css/style.css">
</head>

<body>
  <section class="section" style="padding-top:48px">
    <div class="container">
      <h1 style="margin-bottom:8px">Checkout</h1>
      <p style="margin-bottom:40px">Complete your order</p>
      <div class="cart-layout">
        <div>
          <div class="admin-card" style="margin-bottom:24px">
            <div class="admin-card-header">
              <h3 class="admin-card-title">📦 Delivery Details</h3>
            </div>
            <div style="padding:24px">
              <div class="form-group">
                <label class="form-label">Full Name</label>
                <input type="text" id="fullName" class="form-control" placeholder="Your full name">
              </div>
              <div class="form-group">
                <label class="form-label">Phone Number</label>
                <input type="tel" id="phone" class="form-control" placeholder="98XXXXXXXX">
              </div>
              <div class="form-group">
                <label class="form-label">Shipping Address</label>
                <textarea id="address" class="form-control" rows="3" placeholder="Full delivery address"></textarea>
              </div>
              <div class="form-group">
                <label class="form-label">Order Notes (optional)</label>
                <textarea id="notes" class="form-control" rows="2" placeholder="Special instructions…"></textarea>
              </div>
            </div>
          </div>
          <div class="admin-card">
            <div class="admin-card-header">
              <h3 class="admin-card-title">💳 Payment Method</h3>
            </div>
            <div style="padding:24px;display:flex;flex-direction:column;gap:12px">
              <label
                style="display:flex;align-items:center;gap:12px;padding:16px;border:2px solid var(--border);border-radius:var(--radius-md);cursor:pointer;transition:all .2s"
                id="payEsewa" onclick="selectPayment('esewa')">
                <input type="radio" name="payment" value="esewa" style="accent-color:var(--green)">
                <span style="font-size:1.4rem">🟢</span>
                <div>
                  <div style="font-weight:700">eSewa</div>
                  <div style="font-size:0.78rem;color:var(--gray-400)">Secure digital wallet</div>
                </div>
              </label>
              <label
                style="display:flex;align-items:center;gap:12px;padding:16px;border:2px solid var(--border);border-radius:var(--radius-md);cursor:pointer;transition:all .2s"
                id="payKhalti" onclick="selectPayment('khalti')">
                <input type="radio" name="payment" value="khalti" style="accent-color:purple">
                <span style="font-size:1.4rem">💜</span>
                <div>
                  <div style="font-weight:700">Khalti</div>
                  <div style="font-size:0.78rem;color:var(--gray-400)">Fast & secure payments</div>
                </div>
              </label>
              <label
                style="display:flex;align-items:center;gap:12px;padding:16px;border:2px solid var(--black);border-radius:var(--radius-md);cursor:pointer;background:var(--gray-100);transition:all .2s"
                id="payCod">
                <input type="radio" name="payment" value="cod" checked style="accent-color:var(--black)">
                <span style="font-size:1.4rem">💵</span>
                <div>
                  <div style="font-weight:700">Cash on Delivery</div>
                  <div style="font-size:0.78rem;color:var(--gray-400)">Pay when you receive</div>
                </div>
              </label>
            </div>
          </div>
        </div>
        <div class="order-summary">
          <h3 style="margin-bottom:20px">Order Summary</h3>
          <div id="checkoutItems" style="margin-bottom:16px;display:flex;flex-direction:column;gap:8px"></div>
          <div class="summary-row"><span>Subtotal</span><span id="subtotal">—</span></div>
          <div class="summary-row"><span>Delivery</span><span>रू 100</span></div>
          <div class="summary-row total"><span>Total</span><span id="grandTotal">—</span></div>
          <button id="placeOrderBtn" onclick="placeOrder()" class="btn btn-primary btn-full"
            style="margin-top:20px">Place Order →</button>
          <p style="text-align:center;font-size:0.72rem;color:var(--gray-400);margin-top:10px">🔒 Secure & encrypted
            checkout</p>
        </div>
      </div>
    </div>
  </section>

  <script src="../js/main.js"></script>
  <script>
    function selectPayment(method) {
      ['esewa', 'khalti', 'cod'].forEach(m => {
        const el = document.getElementById(`pay${m.charAt(0).toUpperCase() + m.slice(1)}`);
        if (el) { el.style.borderColor = m === method ? 'var(--black)' : 'var(--border)'; el.style.background = m === method ? 'var(--gray-100)' : ''; }
      });
    }

    async function loadCheckout() {
      const user = await requireAuth();
      if (!user) return;
      const profile = await get(API.profile);
      if (profile.success) {
        document.getElementById('fullName').value = profile.user.name || '';
        document.getElementById('phone').value = profile.user.phone || '';
        document.getElementById('address').value = profile.user.address || '';
      }
      const cart = await get(API.cart);
      if (!cart.success || !cart.items?.length) { window.location.href = 'cart.html'; return; }
      let total = 0;
      document.getElementById('checkoutItems').innerHTML = cart.items.map(item => {
        total += item.price * item.quantity;
        return `<div style="display:flex;justify-content:space-between;font-size:0.85rem"><span style="color:var(--gray-700)">${item.name} × ${item.quantity}</span><span style="font-weight:600">${formatNPR(item.price * item.quantity)}</span></div>`;
      }).join('');
      document.getElementById('subtotal').textContent = formatNPR(total);
      document.getElementById('grandTotal').textContent = formatNPR(total + 100);
    }

    async function placeOrder() {
      const address = document.getElementById('address').value.trim();
      const phone = document.getElementById('phone').value.trim();
      const notes = document.getElementById('notes').value.trim();
      const payment = document.querySelector('input[name=payment]:checked')?.value || 'cod';

      if (!address || !phone) { showToast('Please fill in address and phone.', 'error'); return; }
      const btn = document.getElementById('placeOrderBtn');
      btn.disabled = true; btn.textContent = 'Placing order…';

      // Create the order first
      const r = await post(API.order, { shipping_address: address, phone, notes, payment_method: payment });
      if (!r.success) {
        showToast(r.error || 'Failed to place order.', 'error');
        btn.disabled = false; btn.textContent = 'Place Order →';
        return;
      }

      if (payment === 'esewa') {
        // Real eSewa redirect
        showToast('Connecting to eSewa… 🔄', 'info');
        await initiateEsewaPayment(r.order_id, r.total_amount);
        btn.disabled = false; btn.textContent = 'Place Order →';
      } else {
        showToast('Order placed successfully! 🎉');
        setTimeout(() => window.location.href = `orders.html`, 1500);
      }
    }

    document.addEventListener('appReady', loadCheckout);
  </script>
</body>

</html>
